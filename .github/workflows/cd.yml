name: CD

on:
  workflow_run:
    workflows: [CI]
    types: [completed]
    branches: [main]
  workflow_dispatch:

defaults:
  run:
    working-directory: P7-FSJA

permissions:
  contents: read
  packages: write

jobs:
  publish-images:
    name: Publish Docker images to GHCR
    runs-on: ubuntu-latest
    if: >
      github.event_name == 'workflow_dispatch' ||
      (github.event.workflow_run.conclusion == 'success' &&
       github.event.workflow_run.head_branch == 'main')
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Extract metadata (back)
        id: meta-back
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}/orion-microcrm-back
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,prefix=

      - name: Build and push back image
        uses: docker/build-push-action@v6
        with:
          context: P7-FSJA
          target: back
          push: true
          tags: ${{ steps.meta-back.outputs.tags }}
          labels: ${{ steps.meta-back.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Extract metadata (front)
        id: meta-front
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}/orion-microcrm-front
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,prefix=

      - name: Build and push front image
        uses: docker/build-push-action@v6
        with:
          context: P7-FSJA
          target: front
          push: true
          tags: ${{ steps.meta-front.outputs.tags }}
          labels: ${{ steps.meta-front.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Deployment summary
        run: |
          echo "## Images publiées sur GHCR" >> "$GITHUB_STEP_SUMMARY"
          echo "- \`ghcr.io/${{ github.repository }}/orion-microcrm-back:latest\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- \`ghcr.io/${{ github.repository }}/orion-microcrm-front:latest\`" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "Sur la machine cible :" >> "$GITHUB_STEP_SUMMARY"
          echo '```bash' >> "$GITHUB_STEP_SUMMARY"
          echo "cd P7-FSJA && docker compose pull && docker compose up -d" >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
