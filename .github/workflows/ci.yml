name: CI

on:
  push:
    branches: [main]
    paths:
      - "P7-FSJA/**"
      - ".github/workflows/**"
  pull_request:
    branches: [main]
    paths:
      - "P7-FSJA/**"
      - ".github/workflows/**"

defaults:
  run:
    working-directory: P7-FSJA

permissions:
  contents: read

jobs:
  backend:
    name: Backend — build & tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: gradle
          cache-dependency-path: P7-FSJA/back/gradle/wrapper/gradle-wrapper.properties

      - name: Build and test
        working-directory: P7-FSJA/back
        run: ./gradlew build test jacocoTestReport --no-daemon

      - name: Upload JaCoCo report
        uses: actions/upload-artifact@v4
        with:
          name: jacoco-report
          path: P7-FSJA/back/build/reports/jacoco/test/jacocoTestReport.xml
          retention-days: 7

  frontend:
    name: Frontend — build & tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: P7-FSJA/front/package-lock.json

      - name: Set up Chrome for Karma
        id: setup-chrome
        uses: browser-actions/setup-chrome@v1

      - name: Install dependencies
        working-directory: P7-FSJA/front
        run: npm ci

      - name: Build
        working-directory: P7-FSJA/front
        run: npx ng build --configuration production

      - name: Run unit tests
        working-directory: P7-FSJA/front
        env:
          CHROME_BIN: ${{ steps.setup-chrome.outputs.chrome-path }}
        run: npm run test:ci

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: frontend-coverage
          path: P7-FSJA/front/coverage/lcov.info
          retention-days: 7
          if-no-files-found: warn

  sonarcloud:
    name: SonarCloud analysis
    runs-on: ubuntu-latest
    needs: [backend, frontend]
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: gradle
          cache-dependency-path: P7-FSJA/back/gradle/wrapper/gradle-wrapper.properties

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: P7-FSJA/front/package-lock.json

      - name: Build backend (for binaries)
        working-directory: P7-FSJA/back
        run: ./gradlew build test jacocoTestReport --no-daemon

      - name: Set up Chrome for Karma
        id: setup-chrome
        uses: browser-actions/setup-chrome@v1

      - name: Install frontend & run tests with coverage
        working-directory: P7-FSJA/front
        env:
          CHROME_BIN: ${{ steps.setup-chrome.outputs.chrome-path }}
        run: |
          npm ci
          npm run test:ci

      - name: SonarCloud Scan
        uses: SonarSource/sonarcloud-github-action@v5
        with:
          projectBaseDir: P7-FSJA
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

  docker:
    name: Docker — build images
    runs-on: ubuntu-latest
    needs: [backend, frontend]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build with Docker Compose
        working-directory: P7-FSJA
        run: docker compose build
