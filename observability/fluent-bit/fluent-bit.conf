[SERVICE]
    Flush         5
    Daemon        Off
    Log_Level     info
    Parsers_File  /fluent-bit/etc/parsers.conf

# Logs stdout des conteneurs MicroCRM (driver fluentd → forward)
[INPUT]
    Name        forward
    Listen      0.0.0.0
    Port        24224

# Métriques host (node exporter — compatible Prometheus)
[INPUT]
    Name              node_exporter_metrics
    Tag               server.metrics.host.node
    Scrape_interval   30

[INPUT]
    Name          cpu
    Tag           server.metrics.host.cpu
    Interval_Sec  30

[INPUT]
    Name          mem
    Tag           server.metrics.host.mem
    Interval_Sec  30

[INPUT]
    Name          disk
    Tag           server.metrics.host.disk
    Interval_Sec  30

# Santé TCP (plugin health — Fluent Bit 3.2)
[INPUT]
    Name          health
    Tag           server.health.opensearch
    Host          opensearch-node1
    Port          9200
    Interval_Sec  30
    tls           On
    tls.verify    Off

[INPUT]
    Name          health
    Tag           server.health.back
    Host          host.docker.internal
    Port          8080
    Interval_Sec  30

[INPUT]
    Name          health
    Tag           server.health.front
    Host          host.docker.internal
    Port          80
    Interval_Sec  30

[FILTER]
    Name    record_modifier
    Match   microcrm.*
    Record  event_type log
    Record  source microcrm

# Lignes SECURITY du back → flux dédié SIEM
[FILTER]
    Name          rewrite_tag
    Match         microcrm.*
    Rule          $log ^SECURITY\s+\{.*\}$ security.fluent false
    Emitter_Name  security_emit

[FILTER]
    Name          parser
    Match         security.fluent
    Key_Name      log
    Parser        security_line
    Reserve_Data  On

[FILTER]
    Name          parser
    Match         security.fluent
    Key_Name      payload
    Parser        json
    Reserve_Data  On

[FILTER]
    Name    record_modifier
    Match   security.fluent
    Record  event_type security
    Record  event_category security
    Record  ingest_source fluent_bit

[FILTER]
    Name    grep
    Match   microcrm.*
    Exclude log ^SECURITY

[FILTER]
    Name    record_modifier
    Match   server.health.*
    Record  event_type health

[FILTER]
    Name    record_modifier
    Match   server.health.back*
    Record  source back

[FILTER]
    Name    record_modifier
    Match   server.health.front*
    Record  source front

[FILTER]
    Name    record_modifier
    Match   server.health.opensearch*
    Record  source opensearch

[FILTER]
    Name    record_modifier
    Match   server.metrics.host.*
    Record  event_type metrics
    Record  source host

[OUTPUT]
    Name                opensearch
    Match               security.fluent
    Host                opensearch-node1
    Port                9200
    Index               ${FLUENT_BIT_SECURITY_INDEX}
    HTTP_User           admin
    HTTP_Passwd         ${OPENSEARCH_PASSWORD}
    tls                 On
    tls.verify          Off
    Suppress_Type_Name  On
    Logstash_Format     On
    Logstash_DateFormat %Y-%m-%dT%H:%M:%S
    Replace_Dots        On

[OUTPUT]
    Name                opensearch
    Match_Regex         ^(server\.|microcrm\.)
    Host                opensearch-node1
    Port                9200
    Index               ${FLUENT_BIT_OPENSEARCH_INDEX}
    HTTP_User           admin
    HTTP_Passwd         ${OPENSEARCH_PASSWORD}
    tls                 On
    tls.verify          Off
    Suppress_Type_Name  On
    Logstash_Format     On
    Logstash_DateFormat %Y-%m-%dT%H:%M:%S
    Replace_Dots        On
