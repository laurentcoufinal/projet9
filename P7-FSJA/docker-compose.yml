# json-file par défaut : arrêt fiable (docker stop/kill).
# Logs vers Fluent Bit : voir docker-compose.fluent-logs.yml (Fluent Bit doit être up).
x-logging: &default-logging
  driver: json-file
  options:
    max-size: "10m"
    max-file: "3"

services:
  back:
    build:
      context: .
      target: back
    image: orion-microcrm-back:latest
    env_file:
      - ../.env
    environment:
      OPENSEARCH_HOST: host.docker.internal
      OPENSEARCH_PORT: "9200"
      OPENSEARCH_USERNAME: admin
      OPENSEARCH_PASSWORD: ${OPENSEARCH_INITIAL_ADMIN_PASSWORD}
      OPENSEARCH_ENABLED: "true"
      OPENSEARCH_SECURITY_ACCESS_LOG: "true"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    logging: *default-logging
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/persons"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 40s

  front:
    build:
      context: .
      target: front
    image: orion-microcrm-front:latest
    extra_hosts:
      - "host.docker.internal:host-gateway"
    logging: *default-logging
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      back:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "/dev/null", "http://localhost:80/"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  standalone:
    profiles:
      - standalone
    build:
      context: .
      target: standalone
    image: orion-microcrm-standalone:latest
    ports:
      - "8080:8080"
      - "80:80"
      - "443:443"
