spring.application.name=microcrm

app.cors.allowed-origins=http://localhost:4200,http://localhost:80,https://localhost

opensearch.host=${OPENSEARCH_HOST:localhost}
opensearch.port=${OPENSEARCH_PORT:9200}
opensearch.username=${OPENSEARCH_USERNAME:admin}
opensearch.password=${OPENSEARCH_PASSWORD:}
opensearch.index.defects=microcrm-defects
opensearch.index.security-events=microcrm-security-events
opensearch.security.access-log.enabled=${OPENSEARCH_SECURITY_ACCESS_LOG:true}
opensearch.enabled=${OPENSEARCH_ENABLED:true}

management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=always
management.endpoints.web.base-path=/actuator
